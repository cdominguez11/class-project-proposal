<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOCKED IN</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --fg: #111111;
    --dim: #ccc;
    --mid: #999;
    --border: #e5e5e5;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0a0a0a;
      --fg: #f0f0f0;
      --dim: #333;
      --mid: #666;
      --border: #1a1a1a;
    }
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
    user-select: none;
  }

  .panel {
    width: 100vw;
    height: 100vh;
    display: grid;
    grid-template-rows: 1fr auto;
    grid-template-columns: 1fr 1fr;
    position: relative;
  }

  /* ── TIMER: full top, centered ── */
  .timer-section {
    grid-column: 1 / 3;
    grid-row: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    /* prevent todo from ever pushing this */
    min-height: 0;
  }

  .session-label {
    font-size: 10px;
    letter-spacing: 0.35em;
    color: var(--mid);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  @keyframes flash { 0%,100%{color:var(--fg)} 50%{color:var(--mid)} }

  .time-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(120px, 22vw, 260px);
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--fg);
    transition: color 0.3s, opacity 0.2s;
    cursor: text;
    background: none;
    border: none;
    outline: none;
    text-align: center;
    width: 100%;
    caret-color: var(--mid);
    -moz-appearance: textfield;
  }
  .time-display::-webkit-outer-spin-button,
  .time-display::-webkit-inner-spin-button { -webkit-appearance: none; }
  .time-display.running { color: var(--fg); cursor: default; pointer-events: none; }
  .time-display.warning { animation: pulse 1s ease-in-out infinite; }
  .time-display.done    { animation: flash 0.5s ease-in-out 6; }
  .time-display.editing { opacity: 0.45; }

  /* ── TODO: bottom-left ── */
  .todo-section {
    grid-column: 1;
    grid-row: 2;
    padding: 0 0 52px 64px;
    display: flex;
    flex-direction: column;
    max-width: 440px;
    max-height: 220px;
    justify-content: flex-end;
  }

  .todo-list {
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    scrollbar-width: none;
    flex: 1;
    justify-content: flex-end;
  }
  .todo-list::-webkit-scrollbar { display: none; }

  @keyframes fadeIn { from{opacity:0;transform:translateY(-3px)} to{opacity:1;transform:translateY(0)} }

  .todo-item {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 8px 0;
    animation: fadeIn 0.15s ease;
  }

  .bullet {
    color: var(--mid);
    font-size: 12px;
    flex-shrink: 0;
    line-height: 1.6;
    cursor: pointer;
    transition: color 0.15s;
    width: 10px;
    text-align: center;
    user-select: none;
  }
  .bullet:hover { color: var(--fg); }
  .bullet.done-bullet { color: var(--dim); }

  .todo-text {
    flex: 1;
    font-size: 13px;
    line-height: 1.6;
    color: var(--fg);
    word-break: break-word;
    outline: none;
    cursor: text;
    user-select: text;
  }
  .todo-text.done {
    color: var(--dim);
    text-decoration: line-through;
    text-decoration-color: var(--dim);
  }

  .todo-new {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 4px 0;
  }

  .new-bullet {
    color: var(--dim);
    font-size: 12px;
    flex-shrink: 0;
    line-height: 1.6;
    width: 10px;
    text-align: center;
  }

  .todo-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--mid);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    caret-color: var(--fg);
    user-select: text;
  }
  .todo-input::placeholder { color: var(--dim); }
  .todo-input:focus { color: var(--fg); }



  /* ── CONTROLS HINT: bottom-right ── */
  .controls-hint {
    grid-column: 2;
    grid-row: 2;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    justify-content: flex-end;
    padding: 0 64px 52px 0;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--dim);
    text-transform: uppercase;
    gap: 4px;
    user-select: none;
  }

  /* ── NOTIFICATION ── */
  .notif {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(-60px);
    background: var(--fg);
    color: var(--bg);
    font-size: 10px;
    letter-spacing: 0.25em;
    padding: 8px 20px;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
    z-index: 100;
    text-transform: uppercase;
  }
  .notif.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="notif" id="notif">Session complete</div>

<div class="panel">

  <div class="timer-section">
    <div class="session-label" id="sessionLabel">READY</div>
    <input class="time-display" id="timeDisplay" type="text" value="25:00"
      maxlength="7" spellcheck="false" autocomplete="off" aria-label="Timer" />
  </div>

  <div class="todo-section">
    <div class="todo-list" id="todoList"></div>
    <div class="todo-new">
      <span class="new-bullet">–</span>
      <input class="todo-input" id="todoInput" type="text"
        placeholder="add item..." maxlength="200" />
    </div>
  </div>

  <div class="controls-hint">
    <span>SPACE · pause</span>
    <span>ENTER · start</span>
  </div>

</div>

<script>
// ── TIMER ──────────────────────────────────────────────────────────────
let totalSeconds = 25 * 60;
let remaining   = totalSeconds;
let running     = false;
let interval    = null;
let startedAt   = null;
let startedWith = null;

const display   = document.getElementById('timeDisplay');
const label     = document.getElementById('sessionLabel');


function fmt(s) {
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function renderTimer() {
  if (document.activeElement !== display) display.value = fmt(remaining);
  display.className = 'time-display' +
    (running ? ' running' : '') +
    (remaining <= 60 && running ? ' warning' : '');
}

display.addEventListener('focus', () => {
  if (running) { display.blur(); return; }
  display.value = fmt(remaining);
  display.classList.add('editing');
  setTimeout(() => display.select(), 10);
});

display.addEventListener('input', () => {
  let raw = display.value.replace(/[^0-9]/g, '');
  if (raw.length > 6) raw = raw.slice(0, 6);
  if (raw.length >= 5) {
    // h:mm:ss
    const h = raw.slice(0, raw.length - 4);
    const m = raw.slice(-4, -2);
    const s = raw.slice(-2);
    display.value = `${h}:${m}:${s}`;
  } else if (raw.length >= 3) {
    // mm:ss
    display.value = raw.slice(0, raw.length - 2) + ':' + raw.slice(-2);
  } else {
    display.value = raw;
  }
});

function commitEdit() {
  display.classList.remove('editing');
  const parts = display.value.split(':');
  let total = 0;
  if (parts.length === 3) {
    total = (parseInt(parts[0]) || 0) * 3600
          + Math.min(parseInt(parts[1]) || 0, 59) * 60
          + Math.min(parseInt(parts[2]) || 0, 59);
  } else if (parts.length === 2) {
    total = (parseInt(parts[0]) || 0) * 60
          + Math.min(parseInt(parts[1]) || 0, 59);
  } else {
    total = parseInt(parts[0]) || 0;
  }
  if (total > 0) {
    totalSeconds = total;
    remaining    = total;
    label.textContent = 'READY';
  }
  renderTimer();
}

display.addEventListener('blur', commitEdit);
display.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); display.blur(); startTimer(); }
  if (e.key === 'Escape') { remaining = totalSeconds; display.blur(); }
});

function startTimer() {
  if (running) return;
  if (remaining === 0) { remaining = totalSeconds; label.textContent = 'READY'; renderTimer(); }
  running     = true;
  startedAt   = Date.now();
  startedWith = remaining;
  label.textContent = 'LOCKED IN';
  interval = setInterval(tick, 500);
  renderTimer();
}

function stopTimer() {
  if (!running) return;
  remaining = Math.max(0, startedWith - Math.floor((Date.now() - startedAt) / 1000));
  running   = false;
  clearInterval(interval);
  label.textContent = 'PAUSED';
  renderTimer();
}

function tick() {
  const elapsed = Math.floor((Date.now() - startedAt) / 1000);
  remaining = Math.max(0, startedWith - elapsed);
  renderTimer();
  if (remaining <= 0) {
    clearInterval(interval);
    running = false;
    display.value = '00:00';
    display.className = 'time-display done';
    label.textContent = 'DONE';
    showNotif();
    if (Notification.permission === 'granted') new Notification('LockedIn', { body: 'Session complete.' });
  }
}

document.addEventListener('keydown', e => {
  const tag = document.activeElement.tagName;
  const isEditable = document.activeElement.isContentEditable;
  const onTimer = document.activeElement === display;
  const onTodo  = tag === 'INPUT' && !onTimer;

  if (e.key === ' ' && !onTodo && !isEditable) {
    e.preventDefault();
    if (running) stopTimer(); else startTimer();
    return;
  }
  if (e.key === 'Enter' && !onTimer && !onTodo && !isEditable) {
    e.preventDefault();
    if (!running && remaining > 0) startTimer();
    return;
  }
  if (!running && !onTimer && !onTodo && !isEditable && /^[0-9]$/.test(e.key)) {
    display.value = '';
    display.focus();
  }
});

function showNotif() {
  const el = document.getElementById('notif');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

if (typeof Notification !== 'undefined' && Notification.permission === 'default') {
  Notification.requestPermission();
}

// ── TODOS ──────────────────────────────────────────────────────────────
let todos = [];

document.getElementById('todoInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); addTodo(); }
});

function addTodo() {
  const inp = document.getElementById('todoInput');
  const text = inp.value.trim();
  if (!text) return;
  todos.push({ id: Date.now(), text, done: false });
  inp.value = '';
  renderTodos();
}

function toggleTodo(id) {
  const t = todos.find(x => x.id === id);
  if (t) t.done = !t.done;
  renderTodos();
}

function deleteTodo(id) {
  todos = todos.filter(x => x.id !== id);
  renderTodos();
}

function renderTodos() {
  const list = document.getElementById('todoList');
  const ordered = [...todos.filter(x => !x.done), ...todos.filter(x => x.done)];
  list.innerHTML = '';
  ordered.forEach(t => {
    const row = document.createElement('div');
    row.className = 'todo-item';

    const bullet = document.createElement('span');
    bullet.className = 'bullet' + (t.done ? ' done-bullet' : '');
    bullet.textContent = t.done ? '×' : '–';
    bullet.title = t.done ? 'remove' : 'done';
    bullet.onclick = () => t.done ? deleteTodo(t.id) : toggleTodo(t.id);

    const txt = document.createElement('div');
    txt.className = 'todo-text' + (t.done ? ' done' : '');
    txt.contentEditable = 'true';
    txt.setAttribute('spellcheck', 'false');
    txt.textContent = t.text;
    txt.oninput = () => { const td = todos.find(x => x.id === t.id); if (td) td.text = txt.textContent; };
    txt.onkeydown = e => {
      if (e.key === 'Enter') { e.preventDefault(); document.getElementById('todoInput').focus(); }
      if (e.key === 'Backspace' && txt.textContent === '') { e.preventDefault(); deleteTodo(t.id); }
    };

    row.append(bullet, txt);
    list.appendChild(row);
  });
}

renderTimer();
renderTodos();
</script>
</body>
</html>
